name: Build Installers

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:

  # ── Windows Build ──────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install pyinstaller pywin32 pystray pillow

      - name: Build exe with PyInstaller
        run: |
          cd "20-20-20-application/Windows"
          pyinstaller --onefile --windowed --name "EyeGuard" eye_guard_2020.pyw

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Create NSIS installer script
        shell: powershell
        run: |
          $nsi = @'
          !define APP_NAME "Eye Guard 20-20-20"
          !define EXE_NAME "EyeGuard.exe"

          Name "${APP_NAME}"
          OutFile "EyeGuard-Setup.exe"
          InstallDir "$PROGRAMFILES\EyeGuard"
          RequestExecutionLevel admin

          Page directory
          Page instfiles

          Section "Install"
              SetOutPath "$INSTDIR"
              File "20-20-20-application\Windows\dist\EyeGuard.exe"
              CreateShortcut "$DESKTOP\Eye Guard.lnk" "$INSTDIR\${EXE_NAME}"
              CreateShortcut "$SMPROGRAMS\Eye Guard.lnk" "$INSTDIR\${EXE_NAME}"

              MessageBox MB_YESNO "Start Eye Guard automatically when Windows starts?" IDNO done
                  WriteRegStr HKCU "Software\Microsoft\Windows\CurrentVersion\Run" "EyeGuard" "$INSTDIR\${EXE_NAME}"
              done:
          SectionEnd

          Section "Uninstall"
              Delete "$INSTDIR\${EXE_NAME}"
              Delete "$DESKTOP\Eye Guard.lnk"
              Delete "$SMPROGRAMS\Eye Guard.lnk"
              DeleteRegValue HKCU "Software\Microsoft\Windows\CurrentVersion\Run" "EyeGuard"
              RMDir "$INSTDIR"
          SectionEnd
          '@
          $nsi | Out-File -Encoding ASCII installer.nsi

      - name: Compile NSIS installer
        shell: powershell
        run: |
          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          & $makensis installer.nsi

      - name: Upload installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: EyeGuard-Setup.exe

  # ── macOS Build ────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip3 install pyinstaller rumps pyobjc Pillow

      - name: Build .app with PyInstaller
        run: |
          cd "20-20-20-application/Mac"
          pyinstaller --onefile --windowed --name "EyeGuard" eye_guard_mac.py

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Eye Guard" \
            --window-size 500 300 \
            --icon-size 100 \
            --icon "EyeGuard.app" 150 150 \
            --app-drop-link 350 150 \
            "EyeGuard.dmg" \
            "20-20-20-application/Mac/dist/" || true

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: EyeGuard.dmg
