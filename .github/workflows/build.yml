name: Build Installers

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:

  # ── Windows Build ──────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install pyinstaller pywin32 pystray pillow

      - name: Build exe with PyInstaller
        run: |
          cd "20-20-20-application/Windows"
          pyinstaller --onefile --windowed --name "EyeGuard" eye_guard_2020.pyw

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Create NSIS installer script
        shell: powershell
        run: |
          $nsi = @'
          !define APP_NAME "Eye Guard 20-20-20"
          !define EXE_NAME "EyeGuard.exe"

          Name "${APP_NAME}"
          OutFile "EyeGuard-Setup.exe"
          InstallDir "$PROGRAMFILES\EyeGuard"
          RequestExecutionLevel admin

          Page directory
          Page instfiles

          Section "Install"
              SetOutPath "$INSTDIR"
              File "20-20-20-application\Windows\dist\EyeGuard.exe"
              CreateShortcut "$DESKTOP\Eye Guard.lnk" "$INSTDIR\${EXE_NAME}"
              CreateShortcut "$SMPROGRAMS\Eye Guard.lnk" "$INSTDIR\${EXE_NAME}"

              MessageBox MB_YESNO "Start Eye Guard automatically when Windows starts?" IDNO done
                  WriteRegStr HKCU "Software\Microsoft\Windows\CurrentVersion\Run" "EyeGuard" "$INSTDIR\${EXE_NAME}"
              done:
          SectionEnd

          Section "Uninstall"
              Delete "$INSTDIR\${EXE_NAME}"
              Delete "$DESKTOP\Eye Guard.lnk"
              Delete "$SMPROGRAMS\Eye Guard.lnk"
              DeleteRegValue HKCU "Software\Microsoft\Windows\CurrentVersion\Run" "EyeGuard"
              RMDir "$INSTDIR"
          SectionEnd
          '@
          $nsi | Out-File -Encoding ASCII installer.nsi

      - name: Compile NSIS installer
        shell: powershell
        run: |
          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          & $makensis installer.nsi

      - name: Create Windows zip package
        shell: powershell
        run: |
          $zipDir = "EyeGuard-Windows"
          New-Item -ItemType Directory -Force -Path $zipDir

          Copy-Item "20-20-20-application\Windows\eye_guard_2020.pyw" "$zipDir\"
          Copy-Item "20-20-20-application\Windows\install.bat"         "$zipDir\setup.bat"
          Copy-Item "20-20-20-application\Windows\startup.bat"         "$zipDir\"

          # Create run.bat
          @"
          @echo off
          python --version >nul 2>&1
          if errorlevel 1 (
              echo Python not found. Please run setup.bat first.
              pause
              exit /b 1
          )
          python -c "import pystray, PIL" >nul 2>&1
          if errorlevel 1 (
              echo Dependencies missing. Please run setup.bat first.
              pause
              exit /b 1
          )
          start "" pythonw "%~dp0eye_guard_2020.pyw"
          "@ | Out-File -Encoding ASCII "$zipDir\run.bat"

          # Create README
          @"
          EYE GUARD 20-20-20 - Windows (ZIP Version)
          ===========================================
          For use on restricted/work machines where installers are blocked.

          QUICK START
          1. Run setup.bat once to install dependencies
          2. Double-click run.bat to launch the app
          3. App runs silently in your system tray (bottom-right)

          AUTO-START ON LOGIN (optional)
          Run startup.bat and confirm.

          REQUIREMENTS
          Python 3.8+ from https://www.python.org/downloads/
          (check Add Python to PATH during install)

          QUIT
          Right-click the tray icon then Quit
          "@ | Out-File -Encoding ASCII "$zipDir\README.txt"

          Compress-Archive -Path "$zipDir\*" -DestinationPath "EyeGuard-Windows.zip"

      - name: Upload Windows installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: EyeGuard-Setup.exe

      - name: Upload Windows zip to Release
        uses: softprops/action-gh-release@v2
        with:
          files: EyeGuard-Windows.zip

  # ── macOS Build ────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip3 install pyinstaller rumps pyobjc Pillow

      - name: Build .app with PyInstaller
        run: |
          cd "20-20-20-application/Mac"
          pyinstaller --onefile --windowed --name "EyeGuard" eye_guard_mac.py

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Eye Guard" \
            --window-size 500 300 \
            --icon-size 100 \
            --icon "EyeGuard.app" 150 150 \
            --app-drop-link 350 150 \
            "EyeGuard.dmg" \
            "20-20-20-application/Mac/dist/" || true

      - name: Create Mac zip package
        run: |
          mkdir -p EyeGuard-Mac
          cp 20-20-20-application/Mac/eye_guard_mac.py EyeGuard-Mac/

          cat > EyeGuard-Mac/setup.sh << 'EOF'
          #!/bin/bash
          echo "========================================"
          echo "  20-20-20 Eye Guard - Setup"
          echo "========================================"
          DIR="$(cd "$(dirname "$0")" && pwd)"
          chmod +x "$DIR/setup.sh" "$DIR/run.sh" "$DIR/startup.sh" "$DIR/remove_startup.sh" 2>/dev/null
          if ! command -v python3 &> /dev/null; then
              echo "[ERROR] Python 3 not found. Install from https://www.python.org/downloads/"
              exit 1
          fi
          echo "[OK] $(python3 --version)"
          echo "Creating virtual environment..."
          python3 -m venv "$DIR/.venv"
          echo "Installing dependencies..."
          "$DIR/.venv/bin/pip" install --upgrade pip --quiet
          "$DIR/.venv/bin/pip" install rumps pyobjc Pillow
          if [ $? -ne 0 ]; then
              echo "[ERROR] Could not install dependencies."
              exit 1
          fi
          echo "========================================"
          echo "  Setup complete! Run run.sh to launch."
          echo "========================================"
          EOF

          cat > EyeGuard-Mac/run.sh << 'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          VENV_PYTHON="$DIR/.venv/bin/python3"
          if [ ! -f "$VENV_PYTHON" ]; then
              osascript -e 'display alert "Setup required" message "Please run setup.sh first."' 2>/dev/null
              echo "Please run setup.sh first."
              exit 1
          fi
          "$VENV_PYTHON" "$DIR/eye_guard_mac.py" &
          EOF

          cat > EyeGuard-Mac/startup.sh << 'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          VENV_PYTHON="$DIR/.venv/bin/python3"
          if [ ! -f "$VENV_PYTHON" ]; then
              echo "Please run setup.sh first."
              exit 1
          fi
          read -p "Start Eye Guard automatically at login? (y/n): " confirm
          if [[ "$confirm" != "y" && "$confirm" != "Y" ]]; then
              echo "Cancelled."
              exit 0
          fi
          PLIST="$HOME/Library/LaunchAgents/com.eyeguard.2020.plist"
          mkdir -p "$HOME/Library/LaunchAgents"
          cat > "$PLIST" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>Label</key><string>com.eyeguard.2020</string>
              <key>ProgramArguments</key>
              <array><string>$VENV_PYTHON</string><string>$DIR/eye_guard_mac.py</string></array>
              <key>RunAtLoad</key><true/>
              <key>KeepAlive</key><false/>
          </dict>
          </plist>
          PLIST
          launchctl load "$PLIST"
          echo "Done! Eye Guard will start automatically at login."
          echo "To undo: run remove_startup.sh"
          EOF

          cat > EyeGuard-Mac/remove_startup.sh << 'EOF'
          #!/bin/bash
          PLIST="$HOME/Library/LaunchAgents/com.eyeguard.2020.plist"
          [ ! -f "$PLIST" ] && echo "Not set to run on startup." && exit 0
          launchctl unload "$PLIST" && rm "$PLIST"
          echo "Removed from startup."
          EOF

          cat > EyeGuard-Mac/README.txt << 'EOF'
          EYE GUARD 20-20-20 - Mac (ZIP Version)
          =======================================
          For use on restricted/work machines where installers are blocked.

          QUICK START
          1. Open Terminal
          2. Type: bash (drag setup.sh here) then press Enter — run once
          3. Type: bash (drag run.sh here) then press Enter to launch
          App runs silently in your menu bar (top-right, shows eye 19:42)

          AUTO-START ON LOGIN (optional)
          Type: bash (drag startup.sh here) then press Enter
          To undo: bash remove_startup.sh

          REQUIREMENTS
          Python 3.8+ from https://www.python.org/downloads/

          QUIT
          Click the eye icon in menu bar then Quit Eye Guard
          EOF

          chmod +x EyeGuard-Mac/setup.sh EyeGuard-Mac/run.sh EyeGuard-Mac/startup.sh EyeGuard-Mac/remove_startup.sh
          zip -r EyeGuard-Mac.zip EyeGuard-Mac/

      - name: Upload Mac DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: EyeGuard.dmg

      - name: Upload Mac zip to Release
        uses: softprops/action-gh-release@v2
        with:
          files: EyeGuard-Mac.zip
